name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# principle of least privilege
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      
      - name: Verify dependencies
        run: make verify

      - name: Run unit tests
        run: make test